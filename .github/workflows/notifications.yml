name: Notification Emails Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Call notifications endpoint
        run: |
          curl -f -X GET "https://reviewreply-ai-pi.vercel.app/api/cron/notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
